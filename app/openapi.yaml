openapi: 3.0.3
info:
  title: AGR PDF Extraction Service API
  version: 1.0.0
  description: |
    REST API for asynchronous PDF extraction using GROBID, Docling, and Marker,
    with optional merge output and artifact retrieval.

servers:
  - url: /api/v1
    description: API v1

tags:
  - name: Health
  - name: Extractions
  - name: Artifacts
  - name: Downloads

paths:
  /health:
    get:
      tags: [Health]
      summary: Service health check
      operationId: getHealth
      responses:
        "200":
          description: Service is available (may be degraded).
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthResponse"
        "503":
          description: Service is unhealthy.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthResponse"

  /config:
    get:
      tags: [Health]
      summary: Current LLM model configuration
      operationId: getConfig
      description: |
        Returns the exact source-merge contract and every reachable GPT-5.6
        model role loaded in the running container.
      responses:
        "200":
          description: Current configuration.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ConfigResponse"

  /extractions:
    get:
      tags: [Extractions]
      summary: List extraction runs
      operationId: listExtractions
      parameters:
        - in: query
          name: status
          schema:
            type: string
            enum: [pending, started, complete, queued, running, succeeded, failed]
          description: Filter by status.
        - in: query
          name: reference_curie
          schema:
            type: string
          description: Filter by reference CURIE.
        - in: query
          name: mod_abbreviation
          schema:
            type: string
          description: Filter by MOD abbreviation.
        - in: query
          name: limit
          schema:
            type: integer
            minimum: 1
            maximum: 200
            default: 50
          description: Max number of rows returned.
        - in: query
          name: offset
          schema:
            type: integer
            minimum: 0
            default: 0
          description: Number of rows to skip.
      responses:
        "200":
          description: Extraction runs.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ExtractionListResponse"
        "500":
          description: Query failed.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "503":
          description: Database unavailable.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /extract:
    post:
      tags: [Extractions]
      summary: Submit a PDF extraction job
      operationId: submitExtraction
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required: [file]
              properties:
                file:
                  type: string
                  format: binary
                  description: PDF file to extract.
                methods:
                  type: string
                  default: grobid,docling,marker
                  description: Comma-separated methods (`grobid`, `docling`, `marker`).
                merge:
                  type: boolean
                  default: true
                  description: Whether to run merge output generation.
                extract_images:
                  type: boolean
                  default: false
                  description: Whether to extract Marker figure images and upload image artifacts.
                review_images:
                  type: boolean
                  default: true
                  description: >-
                    Whether to run text-only LLM review over extracted image
                    context. Defaults to true when extract_images=true; send
                    false to skip review.
                reference_curie:
                  type: string
                  nullable: true
                mod_abbreviation:
                  type: string
                  nullable: true
                clear_cache:
                  type: boolean
                  default: false
                  description: >-
                    When true, deletes any cached extraction outputs for this
                    PDF (keyed by file hash) before processing. Useful to
                    force a fresh extraction after config or model changes.
                clear_cache_scope:
                  type: string
                  enum: [none, merge, extraction, all]
                  default: none
                  description: >-
                    Scoped cache clear mode. `merge` clears merged artifacts only;
                    `extraction` clears extractor caches and also merged artifacts;
                    `all` keeps legacy full-clear behavior. If omitted, `clear_cache=true`
                    behaves as `all`.
      responses:
        "202":
          description: Job queued.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SubmitExtractionResponse"
        "400":
          description: Invalid input.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "503":
          description: Could not enqueue extraction task.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /extract/{process_id}:
    get:
      tags: [Extractions]
      summary: Poll extraction status and result
      operationId: getExtractionStatus
      parameters:
        - $ref: "#/components/parameters/ProcessId"
      responses:
        "200":
          description: Status available.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ExtractionStatusResponse"
  /extract/{process_id}/cancel:
    post:
      tags: [Extractions]
      summary: Cancel an extraction job
      operationId: cancelExtraction
      parameters:
        - $ref: "#/components/parameters/ProcessId"
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                reason:
                  type: string
                  description: Optional cancellation reason.
      responses:
        "202":
          description: Cancellation accepted.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CancelExtractionResponse"
        "409":
          description: Job already terminal.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CancelExtractionResponse"

  /extract/{process_id}/download/{method}:
    get:
      tags: [Downloads]
      summary: Download extraction output
      operationId: downloadExtractionOutput
      parameters:
        - $ref: "#/components/parameters/ProcessId"
        - $ref: "#/components/parameters/DownloadMethod"
      responses:
        "200":
          description: File returned from local cache.
          content:
            text/markdown:
              schema:
                type: string
                format: binary
            application/json:
              schema:
                type: string
                format: binary
        "302":
          description: Redirect to pre-signed S3 URL.
        "400":
          description: Invalid method.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: Process or requested artifact not found; merged output may not have been requested.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "409":
          description: Job not complete.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/JobNotCompleteResponse"
        "500":
          description: A completed merge violated its durable-artifact invariant.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /extract/{process_id}/images:
    get:
      tags: [Downloads]
      summary: List extracted images for a job
      operationId: listExtractionImages
      parameters:
        - $ref: "#/components/parameters/ProcessId"
      responses:
        "200":
          description: Image metadata list.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ImageListResponse"
        "404":
          description: Process not found.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "409":
          description: Job not complete.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/JobNotCompleteResponse"

  /extract/{process_id}/images/urls:
    get:
      tags: [Downloads]
      summary: Get pre-signed URLs for extracted images
      operationId: getExtractionImageUrls
      parameters:
        - $ref: "#/components/parameters/ProcessId"
      responses:
        "200":
          description: Image URL manifest.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ImageUrlManifestResponse"
        "404":
          description: Process not found.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "409":
          description: Job not complete.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/JobNotCompleteResponse"
        "503":
          description: S3 client unavailable.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /extract/{process_id}/images/{filename}:
    get:
      tags: [Downloads]
      summary: Download a single extracted image
      operationId: downloadExtractionImage
      parameters:
        - $ref: "#/components/parameters/ProcessId"
        - in: path
          name: filename
          required: true
          schema:
            type: string
          description: Image filename.
      responses:
        "200":
          description: Image returned from local cache.
          content:
            image/*:
              schema:
                type: string
                format: binary
        "302":
          description: Redirect to pre-signed S3 URL.
        "404":
          description: Process or image not found.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "409":
          description: Job not complete.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/JobNotCompleteResponse"

  /extract/{process_id}/logs:
    get:
      tags: [Artifacts]
      summary: Get pre-signed URL for NDJSON audit log
      operationId: getExtractionLogUrl
      parameters:
        - $ref: "#/components/parameters/ProcessId"
      responses:
        "200":
          description: URL generated.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LogUrlResponse"
        "404":
          description: Process or log not found.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "500":
          description: URL generation failed.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "503":
          description: S3 client unavailable.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /extract/{process_id}/artifacts:
    get:
      tags: [Artifacts]
      summary: Get raw artifacts_json for a process
      operationId: getExtractionArtifacts
      parameters:
        - $ref: "#/components/parameters/ProcessId"
      responses:
        "200":
          description: Artifact metadata.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ArtifactsResponse"
        "404":
          description: Process not found.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /extract/{process_id}/artifacts/urls:
    get:
      tags: [Artifacts]
      summary: Get pre-signed URLs for all artifact keys
      operationId: getExtractionArtifactUrls
      parameters:
        - $ref: "#/components/parameters/ProcessId"
      responses:
        "200":
          description: Artifact URLs.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ArtifactUrlsResponse"
        "404":
          description: Process not found or no artifacts.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "503":
          description: S3 client unavailable.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

components:
  parameters:
    ProcessId:
      in: path
      name: process_id
      required: true
      schema:
        type: string
        format: uuid
      description: Extraction process ID.
    DownloadMethod:
      in: path
      name: method
      required: true
      schema:
        type: string
        enum: [grobid, docling, marker, merged, audit]
      description: Output method to download.

  schemas:
    ErrorResponse:
      type: object
      required: [error]
      properties:
        error:
          type: string
        status:
          type: string
          description: Included on some conflict responses.

    JobNotCompleteResponse:
      type: object
      required: [error, status]
      properties:
        error:
          type: string
        status:
          type: string

    HealthResponse:
      type: object
      required: [status, checks]
      properties:
        status:
          type: string
          enum: [ok, busy, degraded, unhealthy]
        checks:
          type: object
          required: [service, grobid, redis, workers]
          properties:
            service:
              type: string
            grobid:
              type: string
              enum: [ok, degraded, unavailable]
            redis:
              type: string
              enum: [ok, unavailable]
            workers:
              oneOf:
                - type: integer
                - type: string
                  enum: [unknown]
            broker_queued:
              oneOf:
                - type: integer
                - type: string
                  enum: [unknown]
              description: Celery Redis default queue depth when available.
            broker_unacked:
              oneOf:
                - type: integer
                - type: string
                  enum: [unknown]
              description: Celery Redis in-flight task count when available.
            active_runs:
              oneOf:
                - type: integer
                - type: string
                  enum: [unknown]
              description: Count of extraction runs currently marked running.
            fresh_active_runs:
              oneOf:
                - type: integer
                - type: string
                  enum: [unknown]
              description: Count of running extraction rows recent enough to count as live busy-worker evidence.
            queued_runs:
              oneOf:
                - type: integer
                - type: string
                  enum: [unknown]
              description: Count of extraction runs currently marked queued.
            worker_state:
              type: string
              enum: [busy, busy_or_unresponsive]
              description: Present when a solo worker is busy and cannot answer inspect. `busy_or_unresponsive` is retained for compatibility with older deployments.

    ExtractionListItem:
      type: object
      required:
        - process_id
        - status
        - has_artifacts
        - has_log
      properties:
        process_id:
          type: string
          format: uuid
        status:
          type: string
          enum: [pending, started, complete, failed, queued, running, succeeded, cancelled]
        reference_curie:
          type: string
          nullable: true
        mod_abbreviation:
          type: string
          nullable: true
        source_pdf_md5:
          type: string
          nullable: true
        config_version:
          type: string
          nullable: true
        started_at:
          type: string
          format: date-time
          nullable: true
        ended_at:
          type: string
          format: date-time
          nullable: true
        error_code:
          type: string
          nullable: true
        has_artifacts:
          type: boolean
        has_log:
          type: boolean
        extract_images:
          type: boolean
        review_images:
          type: boolean

    ExtractionListResponse:
      type: object
      required: [total, limit, offset, items]
      properties:
        total:
          type: integer
        limit:
          type: integer
        offset:
          type: integer
        items:
          type: array
          items:
            $ref: "#/components/schemas/ExtractionListItem"

    SubmitExtractionResponse:
      type: object
      required: [process_id, status, methods, merge, clear_cache_scope, extract_images, review_images]
      properties:
        process_id:
          type: string
          format: uuid
        status:
          type: string
          enum: [queued]
        methods:
          type: array
          items:
            type: string
            enum: [grobid, docling, marker]
        merge:
          type: boolean
        extract_images:
          type: boolean
        review_images:
          type: boolean
        clear_cache_scope:
          type: string
          enum: [none, merge, extraction, all]
        reference_curie:
          type: string
          nullable: true
        mod_abbreviation:
          type: string
          nullable: true

    ExtractionStatusResponse:
      type: object
      required: [process_id, status]
      properties:
        process_id:
          type: string
        status:
          type: string
          enum:
            - pending
            - started
            - progress
            - complete
            - failed
            - queued
            - running
            - succeeded
            - cancelled
        detail:
          description: Celery PROGRESS payload.
          oneOf:
            - type: object
              additionalProperties: true
            - type: string
        result:
          type: object
          additionalProperties: true
        reference_curie:
          type: string
          nullable: true
        mod_abbreviation:
          type: string
          nullable: true
        source_pdf_md5:
          type: string
          nullable: true
        extract_images:
          type: boolean
        review_images:
          type: boolean
        started_at:
          type: string
          format: date-time
          nullable: true
        ended_at:
          type: string
          format: date-time
          nullable: true
        log_s3_key:
          type: string
          nullable: true
        artifacts_json:
          type: object
          additionalProperties: true
          nullable: true
        image_count:
          type: integer
          description: Number of extracted image artifacts recorded for this job.
        error_code:
          type: string
          nullable: true
        error:
          type: string
          nullable: true
        llm_cost_usd:
          type: number
          format: float
          nullable: true
          description: Estimated LLM cost in USD for this extraction run.
        llm_usage_json:
          type: object
          additionalProperties: true
          nullable: true
          description: Full LLM token usage breakdown (tokens, pricing, per-call-type detail).
        consensus_metrics_json:
          type: object
          additionalProperties: true
          nullable: true
          description: >-
            Consensus pipeline metrics including quality score,
            agreement/conflict counts, and degradation analysis.

    CancelExtractionResponse:
      type: object
      required: [process_id, status, message]
      properties:
        process_id:
          type: string
        status:
          type: string
          enum: [cancelled, complete, failed]
        message:
          type: string

    LogUrlResponse:
      type: object
      required: [log_url, expires_in]
      properties:
        log_url:
          type: string
          format: uri
        expires_in:
          type: integer
          example: 3600

    ArtifactsResponse:
      type: object
      required: [process_id, artifacts_json]
      properties:
        process_id:
          type: string
        artifacts_json:
          type: object
          additionalProperties: true

    ArtifactUrlEntry:
      type: object
      required: [name, s3_key]
      properties:
        name:
          type: string
          description: JSONPath-like location in artifacts_json.
        s3_key:
          type: string
        url:
          type: string
          format: uri
        error:
          type: string

    ArtifactUrlsResponse:
      type: object
      required: [process_id, expires_in, artifact_urls]
      properties:
        process_id:
          type: string
        expires_in:
          type: integer
        artifact_urls:
          type: array
          items:
            $ref: "#/components/schemas/ArtifactUrlEntry"

    ImageListResponse:
      type: object
      required: [process_id, images]
      properties:
        process_id:
          type: string
        images:
          type: array
          items:
            $ref: "#/components/schemas/ImageMetadata"
        source:
          type: string
          description: Included when loaded from DB/S3-backed artifacts.

    ImageMetadata:
      type: object
      additionalProperties: true
      properties:
        filename:
          type: string
        url:
          type: string
        s3_key:
          type: string
        size_bytes:
          type: integer
        page_index:
          type: integer
          nullable: true
          description: Zero-based PDF page index parsed from Marker's generated filename, when available.
        marker_image_type:
          type: string
          nullable: true
          description: Marker image class parsed from the filename, such as Picture or Figure.
        marker_image_index:
          type: integer
          nullable: true
          description: Marker's internal image index from the filename; this is not the paper's figure number.
        block_id:
          type: string
          nullable: true
          description: Marker block id for the image, when available.
        group_id:
          type: string
          nullable: true
          description: Marker FigureGroup or PictureGroup id when the image is grouped with a caption.
        bbox:
          type: array
          nullable: true
          description: Marker image bounding box as [x1, y1, x2, y2] in PDF page coordinates.
          items:
            type: number
        polygon:
          type: array
          nullable: true
          description: Marker image polygon in PDF page coordinates.
          items:
            type: array
            items:
              type: number
        image_width:
          type: integer
          nullable: true
        image_height:
          type: integer
          nullable: true
        is_likely_figure:
          type: boolean
          nullable: true
          description: Conservative server-side heuristic for whether this artifact looks like a curation-relevant figure.
        diagnostic_flags:
          type: array
          description: Non-fatal diagnostics such as small_image, no_caption, no_figure_label, or marker_picture_type.
          items:
            type: string
        alt_text:
          type: string
          nullable: true
        caption_text:
          type: string
          nullable: true
          description: Caption text grouped with the image by Marker, when available.
        nearby_text:
          type: string
          nullable: true
          description: Raw text window following the image reference in Marker's Markdown output.
        figure_label:
          type: string
          nullable: true
          description: Author-facing figure label, such as Figure 1 or Fig. 2A, when resolved by text-only LLM review.
        figure_number:
          type: string
          nullable: true
          description: Author-facing figure number, when resolved by text-only LLM review.
        heuristic_is_likely_figure:
          type: boolean
          nullable: true
          description: Deterministic pre-LLM figure heuristic.
        figure_decision_source:
          type: string
          nullable: true
          enum: [heuristic, llm_text]
          description: Source for is_likely_figure.
        image_reviewed:
          type: boolean
        image_review_method:
          type: string
          nullable: true
          enum: [llm_text]
        image_review_model:
          type: string
          nullable: true
        image_review_classification:
          type: string
          nullable: true
          enum: [scientific_figure, table_or_equation, publisher_logo, badge_or_ui, cover_art, decorative, unknown]
        image_review_is_scientific_figure:
          type: boolean
          nullable: true
        image_review_confidence:
          type: number
          nullable: true
        image_review_reason:
          type: string
          nullable: true
        image_review_needs_vision:
          type: boolean
          nullable: true
        image_review_error:
          type: string
          nullable: true

    ImageUrlEntry:
      type: object
      required: [filename, s3_key]
      properties:
        filename:
          type: string
        s3_key:
          type: string
        size_bytes:
          type: integer
          nullable: true
        url:
          type: string
          format: uri
        expires_at:
          type: string
          format: date-time
        error:
          type: string
        page_index:
          type: integer
          nullable: true
          description: Zero-based PDF page index parsed from Marker's generated filename, when available.
        marker_image_type:
          type: string
          nullable: true
          description: Marker image class parsed from the filename, such as Picture or Figure.
        marker_image_index:
          type: integer
          nullable: true
          description: Marker's internal image index from the filename; this is not the paper's figure number.
        block_id:
          type: string
          nullable: true
          description: Marker block id for the image, when available.
        group_id:
          type: string
          nullable: true
          description: Marker FigureGroup or PictureGroup id when the image is grouped with a caption.
        bbox:
          type: array
          nullable: true
          description: Marker image bounding box as [x1, y1, x2, y2] in PDF page coordinates.
          items:
            type: number
        polygon:
          type: array
          nullable: true
          description: Marker image polygon in PDF page coordinates.
          items:
            type: array
            items:
              type: number
        image_width:
          type: integer
          nullable: true
        image_height:
          type: integer
          nullable: true
        is_likely_figure:
          type: boolean
          nullable: true
          description: Conservative server-side heuristic for whether this artifact looks like a curation-relevant figure.
        diagnostic_flags:
          type: array
          description: Non-fatal diagnostics such as small_image, no_caption, no_figure_label, or marker_picture_type.
          items:
            type: string
        alt_text:
          type: string
          nullable: true
        caption_text:
          type: string
          nullable: true
          description: Caption text grouped with the image by Marker, when available.
        nearby_text:
          type: string
          nullable: true
          description: Raw text window following the image reference in Marker's Markdown output.
        figure_label:
          type: string
          nullable: true
          description: Author-facing figure label, such as Figure 1 or Fig. 2A, when resolved by text-only LLM review.
        figure_number:
          type: string
          nullable: true
          description: Author-facing figure number, when resolved by text-only LLM review.
        heuristic_is_likely_figure:
          type: boolean
          nullable: true
          description: Deterministic pre-LLM figure heuristic.
        figure_decision_source:
          type: string
          nullable: true
          enum: [heuristic, llm_text]
          description: Source for is_likely_figure.
        image_reviewed:
          type: boolean
        image_review_method:
          type: string
          nullable: true
          enum: [llm_text]
        image_review_model:
          type: string
          nullable: true
        image_review_classification:
          type: string
          nullable: true
          enum: [scientific_figure, table_or_equation, publisher_logo, badge_or_ui, cover_art, decorative, unknown]
        image_review_is_scientific_figure:
          type: boolean
          nullable: true
        image_review_confidence:
          type: number
          nullable: true
        image_review_reason:
          type: string
          nullable: true
        image_review_needs_vision:
          type: boolean
          nullable: true
        image_review_error:
          type: string
          nullable: true

    ImageUrlManifestResponse:
      type: object
      required: [process_id, images, manifest_ttl_seconds, image_retention_ttl_seconds]
      properties:
        process_id:
          type: string
        images:
          type: array
          items:
            $ref: "#/components/schemas/ImageUrlEntry"
        manifest_ttl_seconds:
          type: integer
          example: 3600
        image_retention_ttl_seconds:
          type: integer
          example: 604800

    CallTypeConfig:
      type: object
      required: [model, reasoning]
      properties:
        model:
          type: string
          example: gpt-5.6-terra
        reasoning:
          type: string
          example: medium

    ResolvedModelConfig:
      type: object
      required: [model, reasoning_effort]
      properties:
        model:
          type: string
          example: gpt-5.6-terra
        reasoning_effort:
          type: string
          example: medium

    ConfigResponse:
      type: object
      required:
        - merge_contract_id
        - resolved_runtime_models
      properties:
        merge_contract_id:
          type: string
          example: pdfx-native-skeleton-selection
          description: Exact source-backed merge contract running in this service.
        resolved_runtime_models:
          type: object
          additionalProperties:
            $ref: "#/components/schemas/ResolvedModelConfig"
