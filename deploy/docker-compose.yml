# docker-compose.yml for agr_pdf_extraction_service
# CPU-first deployment on FlySQL servers
#
# Services:
#   - app:      Flask + Gunicorn (web UI + REST API)
#   - worker:   Celery worker (PDF extraction jobs)
#   - grobid:   GROBID CRF container (scientific PDF parser)
#   - redis:    Job queue and result backend
#   - postgres: Extraction run tracking + audit metadata

x-shared-env: &shared-env
  GROBID_URL: http://grobid:8070
  CELERY_BROKER_URL: redis://redis:6379/0
  CELERY_RESULT_BACKEND: redis://redis:6379/1
  DATABASE_URL: postgresql://pdfx:${POSTGRES_PASSWORD:-pdfx}@postgres:5432/pdfx
  UPLOAD_FOLDER: /app/data/uploads
  CACHE_FOLDER: /app/data/cache
  TORCH_DEVICE: cpu
  CUDA_VISIBLE_DEVICES: ""
  HF_HOME: /app/data/models
  TRANSFORMERS_CACHE: /app/data/models
  TORCH_HOME: /app/data/models

x-shared-volumes: &shared-volumes
  - ../data/cache:/app/data/cache
  - ../data/uploads:/app/data/uploads
  - ../data/models:/app/data/models
  - ../data/model_cache:/root/.cache
  - ../data/rapidocr_models:/usr/local/lib/python3.11/site-packages/rapidocr/models
  - ../logs:/app/logs

services:
  app:
    build:
      context: ..
      dockerfile: deploy/Dockerfile
    container_name: pdfx-app
    restart: unless-stopped
    ports:
      - "5000:5000"
    env_file:
      - ../.env
    environment:
      <<: *shared-env
      OMP_NUM_THREADS: "4"
      MKL_NUM_THREADS: "4"
    volumes: *shared-volumes
    depends_on:
      grobid:
        condition: service_healthy
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/api/v1/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 120s
    command: >
      gunicorn -w 4 -b 0.0.0.0:5000
      --timeout ${PDFX_GUNICORN_TIMEOUT:-1800}
      --graceful-timeout ${PDFX_GUNICORN_GRACEFUL_TIMEOUT:-600}
      "app:create_app()"

  worker:
    build:
      context: ..
      dockerfile: deploy/Dockerfile
    container_name: pdfx-worker
    restart: unless-stopped
    env_file:
      - ../.env
    environment:
      <<: *shared-env
      OMP_NUM_THREADS: ${PDFX_WORKER_OMP_THREADS:-4}
      MKL_NUM_THREADS: ${PDFX_WORKER_MKL_THREADS:-4}
      NUMEXPR_NUM_THREADS: ${PDFX_WORKER_NUMEXPR_THREADS:-4}
    volumes: *shared-volumes
    cpus: ${PDFX_WORKER_CPUS:-4.0}
    mem_limit: ${PDFX_WORKER_MEM_LIMIT:-20g}
    depends_on:
      grobid:
        condition: service_healthy
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy
    command: >
      celery -A celery_app worker
      --loglevel=info
      --concurrency=${PDFX_WORKER_CONCURRENCY:-1}
      --prefetch-multiplier=${PDFX_WORKER_PREFETCH_MULTIPLIER:-1}
      -Q default

  grobid:
    image: grobid/grobid:0.8.2-crf
    container_name: pdfx-grobid
    restart: unless-stopped
    init: true
    ports:
      - "127.0.0.1:${PDFX_GROBID_PORT:-8075}:8070"
    ulimits:
      core: 0
    mem_limit: 5g
    environment:
      # Work around a JVM cgroup v2 detection NPE seen with this image on some Ubuntu 24.04 Docker hosts.
      JAVA_TOOL_OPTIONS: "-XX:-UseContainerSupport"
    healthcheck:
      test: ["CMD-SHELL", "bash -c 'echo > /dev/tcp/localhost/8070'"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

  redis:
    image: redis:7-alpine
    container_name: pdfx-redis
    restart: unless-stopped
    ports:
      - "127.0.0.1:${PDFX_REDIS_PORT:-6385}:6379"
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 3

  postgres:
    image: postgres:16-alpine
    container_name: pdfx-postgres
    restart: unless-stopped
    ports:
      - "127.0.0.1:${PDFX_POSTGRES_PORT:-5545}:5432"
    environment:
      POSTGRES_USER: pdfx
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-pdfx}
      POSTGRES_DB: pdfx
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U pdfx"]
      interval: 10s
      timeout: 5s
      retries: 3

volumes:
  redis-data:
  postgres-data:
