# docker-compose.yml for agr_pdf_extraction_service
# CPU-first deployment on FlySQL servers
#
# Services:
#   - app:      Flask + Gunicorn (web UI + REST API)
#   - worker:   Celery worker (PDF extraction jobs)
#   - grobid:   GROBID CRF container (scientific PDF parser)
#   - redis:    Job queue and result backend
#   - postgres: Extraction run tracking + audit metadata

x-shared-env: &shared-env
  GROBID_URL: http://grobid:8070
  CELERY_BROKER_URL: redis://redis:6379/0
  CELERY_RESULT_BACKEND: redis://redis:6379/1
  DATABASE_URL: postgresql://pdfx:${POSTGRES_PASSWORD:-pdfx}@postgres:5432/pdfx
  TORCH_DEVICE: cpu
  CUDA_VISIBLE_DEVICES: ""
  HF_HOME: /app/data/models
  TRANSFORMERS_CACHE: /app/data/models
  TORCH_HOME: /app/data/models

x-shared-volumes: &shared-volumes
  - ../data/cache:/app/data/cache
  - ../data/uploads:/app/data/uploads
  - ../data/models:/app/data/models
  - ../logs:/app/logs

services:
  app:
    build:
      context: ..
      dockerfile: deploy/Dockerfile
    container_name: pdfx-app
    restart: unless-stopped
    ports:
      - "5000:5000"
    env_file:
      - ../.env
    environment:
      <<: *shared-env
      OMP_NUM_THREADS: "4"
      MKL_NUM_THREADS: "4"
    volumes: *shared-volumes
    depends_on:
      grobid:
        condition: service_healthy
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/api/v1/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 120s
    command: >
      gunicorn -w 4 -b 0.0.0.0:5000
      --timeout 600
      --graceful-timeout 300
      "app:create_app()"

  worker:
    build:
      context: ..
      dockerfile: deploy/Dockerfile
    container_name: pdfx-worker
    restart: unless-stopped
    env_file:
      - ../.env
    environment:
      <<: *shared-env
      OMP_NUM_THREADS: "8"
      MKL_NUM_THREADS: "8"
      NUMEXPR_NUM_THREADS: "8"
    volumes: *shared-volumes
    cpus: 32.0
    mem_limit: 64g
    depends_on:
      grobid:
        condition: service_healthy
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy
    command: >
      celery -A celery_app worker
      --loglevel=info
      --concurrency=2
      -Q default

  grobid:
    image: grobid/grobid:0.8.2-crf
    container_name: pdfx-grobid
    restart: unless-stopped
    init: true
    ports:
      - "127.0.0.1:8070:8070"
    ulimits:
      core: 0
    mem_limit: 5g
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8070/api/isalive"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

  redis:
    image: redis:7-alpine
    container_name: pdfx-redis
    restart: unless-stopped
    ports:
      - "127.0.0.1:6379:6379"
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 3

  postgres:
    image: postgres:16-alpine
    container_name: pdfx-postgres
    restart: unless-stopped
    ports:
      - "127.0.0.1:5432:5432"
    environment:
      POSTGRES_USER: pdfx
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-pdfx}
      POSTGRES_DB: pdfx
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U pdfx"]
      interval: 10s
      timeout: 5s
      retries: 3

volumes:
  redis-data:
  postgres-data:
